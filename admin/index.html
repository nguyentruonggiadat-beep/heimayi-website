<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heimayi — Product Manager</title>
  <link rel="icon" href="/images/logo.png" />
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    var previewStyle = `
      body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f7; margin: 0; padding: 24px; }
      .card { max-width: 320px; background: #fff; border: 1px solid rgba(0,0,0,.08); border-radius: 16px; overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,.08); }
      .card-img { width: 100%; aspect-ratio: 4/3; background: #f5f5f7; display: flex; align-items: center; justify-content: center; overflow: hidden; }
      .card-img img { width: 100%; height: 100%; object-fit: contain; padding: 24px; }
      .card-img .empty { font-size: 12px; color: rgba(0,0,0,.35); }
      .card-body { padding: 20px; }
      .card-name { font-size: 16px; font-weight: 700; letter-spacing: -.035em; color: #111; line-height: 1.25; margin-bottom: 8px; }
      .card-desc { font-size: 13px; line-height: 1.6; color: rgba(0,0,0,.55); margin-bottom: 14px; }
      .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
      .card-tags span { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 4px; background: rgba(0,0,0,.05); color: rgba(0,0,0,.55); }
      .card-specs { border-top: 1px solid rgba(0,0,0,.08); padding-top: 12px; }
      .card-specs table { width: 100%; border-collapse: collapse; }
      .card-specs td { font-size: 12px; padding: 4px 0; color: rgba(0,0,0,.6); vertical-align: top; }
      .card-specs td:first-child { color: rgba(0,0,0,.4); width: 45%; }
      .card-empty-hint { font-size: 12px; color: rgba(0,0,0,.35); margin-top: 8px; }
      .card-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: rgba(0,0,0,.4); margin: 14px 0 8px; }
      .card-features { margin: 0; padding-left: 18px; }
      .card-features li { font-size: 12px; line-height: 1.6; color: rgba(0,0,0,.6); margin-bottom: 4px; }
      .card-apps { display: flex; flex-wrap: wrap; gap: 6px; }
      .card-apps span { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 4px; background: #eaf2ff; color: #0071e3; }
    `;

    function ProductPreview(createClass, h) {
      return createClass({
        render: function () {
          var entry = this.props.entry;
          var products = entry.getIn(['data', 'products']) || [];
          var list = products.toJS ? products.toJS() : [];
          if (!list.length) {
            return h('div', { style: { padding: 24, fontFamily: 'Inter, sans-serif', color: 'rgba(0,0,0,.4)' } }, 'Chưa có sản phẩm nào — thêm sản phẩm để xem trước tại đây.');
          }
          return h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: 20, padding: 24, fontFamily: 'Inter, sans-serif' } },
            list.map(function (p, i) {
              var img = p.image ? this.props.getAsset(p.image) : null;
              return h('div', { className: 'card', key: i },
                h('div', { className: 'card-img' },
                  img ? h('img', { src: img.toString() }) : h('span', { className: 'empty' }, 'Chưa có ảnh')
                ),
                h('div', { className: 'card-body' },
                  h('div', { className: 'card-name' }, (p.code ? p.code + ' — ' : '') + (p.name || 'Chưa đặt tên')),
                  h('div', { className: 'card-desc' }, p.desc || ''),
                  (p.tags && p.tags.length) ? h('div', { className: 'card-tags' },
                    p.tags.map(function (t, ti) { return h('span', { key: ti }, t); })
                  ) : null,
                  (p.features && p.features.length) ? h('div', null,
                    h('div', { className: 'card-section-title' }, 'Key Features'),
                    h('ul', { className: 'card-features' },
                      p.features.map(function (f, fi) { return h('li', { key: fi }, f); })
                    )
                  ) : null,
                  (p.apps && p.apps.length) ? h('div', null,
                    h('div', { className: 'card-section-title' }, 'Applications'),
                    h('div', { className: 'card-apps' },
                      p.apps.map(function (a, ai) { return h('span', { key: ai }, a); })
                    )
                  ) : null,
                  (p.specs && p.specs.length) ? h('div', { className: 'card-specs' },
                    h('table', null,
                      p.specs.map(function (s, si) {
                        return h('tr', { key: si }, h('td', null, s.label), h('td', null, s.value));
                      })
                    )
                  ) : null
                )
              );
            }, this)
          );
        }
      });
    }

    if (window.CMS && window.createClass && window.h) {
      CMS.registerPreviewStyle(previewStyle, { raw: true });
      // All 7 categories share the same file name ("products"), so a single
      // registration covers every collection — Decap keys file-collection
      // previews by file name, not by the parent collection name.
      CMS.registerPreviewTemplate('products', ProductPreview(window.createClass, window.h));
    }
  </script>
</body>
</html>
