backend:
  name: git-gateway
  branch: main

site_url: "https://appheimayi.netlify.app"
display_url: "https://appheimayi.netlify.app"
logo_url: "/images/logo.png"

media_folder: "images"
public_folder: "/images"

locale: vi

# Each category is its own folder collection (_data/products/<category>/),
# so the sidebar always shows products split by category — no manual
# "Group by" step, and every product still opens straight into its own
# edit form. All 7 share the same field layout via a YAML anchor.
collections:
  - name: "electric-valves"
    label: "Van điện (Electric Valves)"
    folder: "_data/products/electric-valves"
    extension: "json"
    format: "json"
    create: true
    delete: true
    slug: "{{fields.code}}"
    summary: "{{code}} — {{name}}"
    fields: &product_fields
      - {label: "Chủ đề nền của trang (sáng/tối)", name: "theme", widget: select, options: ["light", "dark"], default: "light", hint: "light = nền sáng, dark = nền tối — áp dụng cho cả danh mục chứa sản phẩm này"}

      # ── 1. Ảnh — thứ khách nhìn thấy đầu tiên ──
      - {label: "🖼️ Ảnh sản phẩm", name: "image", widget: image, required: false, allow_multiple: false, hint: "Nền trắng hoặc trong suốt sẽ đẹp nhất. Đây là ảnh chính hiện trên thẻ sản phẩm và trang chi tiết."}

      # ── 2. Định danh — mã và tên ──
      - {label: "🏷️ Mã sản phẩm", name: "code", widget: string, hint: "Ví dụ: HVS, HVB — phải DUY NHẤT, không được trùng với sản phẩm khác trong toàn bộ website"}
      - {label: "🏷️ Tên sản phẩm", name: "name", widget: string, hint: "Tên đầy đủ, hiện làm tiêu đề trên thẻ sản phẩm và trang chi tiết"}
      - {label: "📁 Nhóm sản phẩm con (không bắt buộc)", name: "family", widget: string, required: false, hint: "Chỉ dùng khi danh mục có nhiều dòng sản phẩm khác nhau — ví dụ trong IoT Water Meters có 'Ultrasonic Water Meters', 'Electromagnetic & Mechanical Water Meters'... Các sản phẩm cùng tên nhóm sẽ được xếp cạnh nhau kèm tiêu đề nhỏ trên trang web. Để trống nếu danh mục không cần chia nhỏ."}

      # ── 3. Nội dung mô tả ──
      - {label: "📝 Mô tả ngắn (thẻ sản phẩm)", name: "desc", widget: text, hint: "1–2 câu ngắn gọn — hiện trên thẻ sản phẩm ở trang danh mục"}
      - {label: "📝 Mô tả chi tiết (trang sản phẩm)", name: "overview", widget: text, required: false, hint: "Có thể viết dài hơn — chỉ hiện khi khách bấm vào xem chi tiết sản phẩm"}

      # ── 4. Nhãn nổi bật ──
      - label: "⭐ Tags nổi bật"
        name: "tags"
        widget: list
        hint: "Các nhãn nhỏ hiện trên thẻ sản phẩm — ví dụ: DN15–DN150, PN16/PN25, IP65"
        field: {label: "Nội dung tag", name: "tag", widget: string}

      # ── 5. Tính năng nổi bật ──
      - label: "✅ Key Features (tính năng nổi bật)"
        name: "features"
        widget: list
        required: false
        collapsed: true
        summary: "{{fields.feature}}"
        hint: "Danh sách gạch đầu dòng hiện trong trang chi tiết sản phẩm — mỗi dòng là 1 tính năng, viết đầy đủ câu"
        field: {label: "Tính năng", name: "feature", widget: text}

      # ── 6. Ứng dụng / lĩnh vực sử dụng ──
      - label: "🏭 Applications (lĩnh vực ứng dụng)"
        name: "apps"
        widget: list
        required: false
        collapsed: true
        summary: "{{fields.app}}"
        hint: "Các lĩnh vực/ngành mà sản phẩm này thường được dùng — hiện dạng nhãn trong trang chi tiết"
        field: {label: "Lĩnh vực", name: "app", widget: string}

      # ── 7. Bảng thông số kỹ thuật ──
      - label: "⚙️ Bảng thông số kỹ thuật"
        name: "specs"
        widget: list
        collapsed: true
        summary: "{{fields.label}}: {{fields.value}}"
        hint: "Hiện dạng bảng 2 cột trong trang chi tiết sản phẩm — thêm bao nhiêu dòng tuỳ ý"
        fields:
          - {label: "Tên thông số", name: "label", widget: string, hint: "Ví dụ: Áp lực làm việc"}
          - {label: "Giá trị", name: "value", widget: string, hint: "Ví dụ: PN16, tối đa 16 bar"}

